version: '3.8'
services:
  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: u555641943_tcap
    volumes:
      - ./u555641943_tcap.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"

  main-website:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./main-website:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=u555641943_tcap
    depends_on:
      - db

  admin-panel:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    volumes:
      - ./admin-panel:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=u555641943_tcap
    depends_on:
      - db
